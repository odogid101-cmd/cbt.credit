<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Forgot Password - CBT Portal</title>
<style>
:root {
  --primary: #10b981;
  --primary-light: #34d399;
  --primary-dark: #059669;
  --accent: #6ee7b7;
  --bg: linear-gradient(135deg, #064e3b, #065f46, #047857);
  --text: #ecfdf5;
  --card-bg: rgba(255, 255, 255, 0.12);
  --glass: rgba(16, 185, 129, 0.15);
  --glass-border: rgba(110, 231, 183, 0.3);
  --shad: 0 8px 32px rgba(6, 95, 70, 0.3);
  --radius-lg: 20px;
  --radius-md: 15px;
}
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, Arial, sans-serif;
}
.card {
  max-width: 400px;
  width: 90%;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  padding: 32px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shad);
}
h1 { text-align: center; margin: 0 0 10px 0; }
p.desc { text-align: center; margin: 0 0 24px 0; font-size: 14px; opacity: 0.8; }
.step { display: none; }
.step.active { display: block; }
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--glass-border);
  background: var(--glass);
  color: var(--text);
  box-sizing: border-box;
}
input::placeholder { color: rgba(236, 253, 245, 0.6); }
button {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--primary);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
button:hover { background: var(--primary-dark); }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.message { margin-top: 12px; text-align: center; font-size: 14px; }
.error { color: #fca5a5; }
.success { color: var(--accent); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.back-link {
  text-align: center;
  margin-top: 16px;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="card">
  <h1>Reset Password</h1>

  <div id="step1" class="step active">
    <p class="desc">Enter your email to receive a 6-digit code</p>
    <input id="email" type="email" placeholder="Email" />
    <button id="sendCodeBtn">Send Code</button>
  </div>

  <div id="step2" class="step">
    <p class="desc">Enter the 6-digit code sent to your email</p>
    <input id="code" type="text" placeholder="123456" maxlength="6" />
    <button id="verifyCodeBtn">Verify Code</button>
  </div>

  <div id="step3" class="step">
    <p class="desc">Enter your new password</p>
    <input id="newPassword" type="password" placeholder="New Password" />
    <input id="confirmPassword" type="password" placeholder="Confirm Password" />
    <button id="resetBtn">Reset Password</button>
  </div>

  <div id="message" class="message"></div>
  <div class="back-link">
    <a href="login.html">Back to Login</a>
  </div>
</div>

<script src="config.js"></script>
<script>
let resetEmail = "";

document.getElementById('sendCodeBtn').addEventListener('click', async () => {
  const btn = document.getElementById('sendCodeBtn');
  const email = document.getElementById('email').value.trim();

  if(!email) {
    showMessage('Enter your email', 'error');
    return;
  }

  btn.disabled = true;
  showMessage('Sending code...', '');

  try {
    const res = await fetch(`${API_URL}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const result = await res.json();

    if(res.ok) {
      resetEmail = email;
      showMessage('Code sent! Check your email', 'success');
      showStep(2);
    } else {
      showMessage(result.error || 'Failed to send code', 'error');
    }
  } catch {
    showMessage('Network error', 'error');
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
  const btn = document.getElementById('verifyCodeBtn');
  const code = document.getElementById('code').value.trim();

  if(!code) {
    showMessage('Enter the code', 'error');
    return;
  }

  btn.disabled = true;
  showMessage('Verifying...', '');

  try {
    const res = await fetch(`${API_URL}/verify-reset-code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: resetEmail, code })
    });

    const result = await res.json();

    if(res.ok) {
      showMessage('Code verified!', 'success');
      showStep(3);
    } else {
      showMessage(result.error || 'Invalid code', 'error');
    }
  } catch {
    showMessage('Network error', 'error');
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  const btn = document.getElementById('resetBtn');
  const newPassword = document.getElementById('newPassword').value.trim();
  const confirmPassword = document.getElementById('confirmPassword').value.trim();
  const code = document.getElementById('code').value.trim();

  if(!newPassword ||!confirmPassword) {
    showMessage('Fill all fields', 'error');
    return;
  }

  if(newPassword!== confirmPassword) {
    showMessage('Passwords do not match', 'error');
    return;
  }

  btn.disabled = true;
  showMessage('Resetting password...', '');

  try {
    const res = await fetch(`${API_URL}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: resetEmail,
        code: code,
        password: newPassword
      })
    });

    const result = await res.json();

    if(res.ok) {
      showMessage('Password reset successful! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
      showMessage(result.error || 'Reset failed', 'error');
    }
  } catch {
    showMessage('Network error', 'error');
  } finally {
    btn.disabled = false;
  }
});

function showStep(stepNum) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${stepNum}`).classList.add('active');
  document.getElementById('message').textContent = '';
}

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = 'message ' + type;
}
</script>
</body>
</html>
