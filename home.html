  <style>
.profile-wrapper {
  position: relative;
  display: inline-block;
}

/* Glassmorphism dropdown */
.profile-dropdown {
  display: none;
  position: fixed;
  right: 12px;     
  top: 70px;       
  background: rgba(30, 30, 30, 0.6);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 16px;
  padding: 14px;
  width: calc(100vw - 24px);
  max-width: 300px;
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  z-index: 9999;
  box-sizing: border-box;
}

.profile-dropdown.show {
  display: block;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.profile-dropdown .user-info {
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  margin-bottom: 10px;
}

.profile-dropdown .user-info p {
  margin: 5px 0;
  font-size: 13px;
  color: #e0e0e0;
  word-break: break-all;
  line-height: 1.4;
}

.profile-dropdown .user-info .full-name {
  font-weight: 600;
  font-size: 15px;
  color: #fff;
}

.profile-dropdown .user-info .username {
  font-size: 12px;
  color: #6ee7b7;
}

.profile-dropdown .user-info .email {
  font-size: 12px;
  color: #b0b0b0;
}

.profile-dropdown button {
  width: 100%;
  padding: 10px;
  background: rgba(255, 77, 79, 0.85);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}

.profile-dropdown button:hover {
  background: rgba(217, 54, 62, 0.95);
  transform: translateY(-1px);
}

.circle2 img {
  cursor: pointer;
}

.header {
  overflow: visible;
  position: relative;
  z-index: 1000;
}

body, html {
  overflow-x: hidden;
}

  <script>
const API = "https://cbt-credit-zxgb.onrender.com"; // Change to your Render URL
const profileBtn = document.getElementById('profileBtn');
const dropdown = document.getElementById('profileDropdown');
const fullNameEl = document.getElementById('dropdownFullName');
const usernameEl = document.getElementById('dropdownUsername');
const emailEl = document.getElementById('dropdownEmail');

// Load user data from localStorage
function loadUserData() {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const fullName = user.full_name || localStorage.getItem('full_name') || 'Guest';
  const username = user.username || localStorage.getItem('username') || 'guest';
  const email = user.email || localStorage.getItem('email') || 'Not logged in';
  
  fullNameEl.textContent = fullName;
  usernameEl.textContent = '@' + username;
  emailEl.textContent = email;
}

window.addEventListener('DOMContentLoaded', loadUserData);

// Toggle dropdown and position it
profileBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  
  const rect = profileBtn.getBoundingClientRect();
  dropdown.style.top = `${rect.bottom + 8}px`;
  dropdown.style.right = `12px`;
  
  dropdown.classList.toggle('show');
});

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!dropdown.contains(e.target) && !profileBtn.contains(e.target)) {
    dropdown.classList.remove('show');
  }
});

// Logout function
function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

// Example login function - call this after successful login/register
async function loginUser(login, password) {
  try {
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ login, password })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      // Save user data to localStorage
      localStorage.setItem('user', JSON.stringify(data.user));
      localStorage.setItem('full_name', data.user.full_name);
      localStorage.setItem('username', data.user.username);
      localStorage.setItem('email', data.user.email);
      
      loadUserData(); // Update dropdown
      alert("Login successful!");
      window.location.href = 'home.html';
    } else {
      alert(data.error || "Login failed");
    }
  } catch (err) {
    alert("Network error");
  }
}

// Example register function
async function registerUser(full_name, username, email, password) {
  try {
    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ full_name, username, email, password })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      alert("Account created! Please login.");
      window.location.href = 'login.html';
    } else {
      alert(data.error || "Registration failed");
    }
  } catch (err) {
    alert("Network error");
  }
}
  </script>
