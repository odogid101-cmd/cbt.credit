<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<style>
body { margin:0; min-height:100vh; background:linear-gradient(135deg,#064e3b,#065f46,#047857);
  color:#ecfdf5; font-family:system-ui; display:flex; align-items:center; justify-content:center; }
.card { max-width:400px; background:rgba(255,255,255,0.12); backdrop-filter:blur(12px);
  border:1px solid rgba(110,231,183,0.3); padding:30px; border-radius:20px; }
input,button { width:100%; padding:12px; margin:8px 0; border-radius:15px; }
input { border:1px solid rgba(110,231,183,0.3); background:rgba(16,185,129,0.15); color:white; }
button { border:none; background:#10b981; color:white; font-weight:600; cursor:pointer; }
button:disabled { opacity:0.6; cursor:not-allowed; }
.msg { text-align:center; margin-top:10px; }
</style>
</head>
<body>
<div class="card">
  <h2>Enter Reset Code</h2>
  <input type="text" id="code" placeholder="6-digit code" maxlength="6">
  <input type="password" id="password" placeholder="New password">
  <button id="btn" onclick="resetPassword()">Reset Password</button>
  <div class="msg" id="msg"></div>
  <p><a href="admin-Quize.html" style="color:#6ee7b7;">Back to Login</a></p>
</div>

<script src="configQuiz.js"></script>
<script>
async function resetPassword() {
  const code = document.getElementById('code').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');

  if (!code ||!password) return showMsg('Fill all fields', 'error');

  btn.disabled = true;
  const res = await fetch(`${CONFIG.API_URL}/reset-password`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ token: code, password })
  });
  const data = await res.json();
  showMsg(data.message || data.error, res.ok? 'success' : 'error');
  if (res.ok) setTimeout(()=>location.href='admin-Quize.html', 2000);
  btn.disabled = false;
}

function showMsg(text, type) {
  document.getElementById('msg').textContent = text;
  document.getElementById('msg').style.color = type === 'error'? '#fca5a5' : '#6ee7b7';
}
</script>
</body>
</html>
