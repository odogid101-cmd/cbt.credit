<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password - CBT Portal</title>
  <style>
    :root {
      --primary: #10b981;        
      --primary-light: #34d399;  
      --primary-dark: #059669;   
      --accent: #6ee7b7;         
      --bg: linear-gradient(135deg, #064e3b, #065f46, #047857);
      --text: #ecfdf5;           
      --card-bg: rgba(255, 255, 255, 0.12); 
      --glass: rgba(16, 185, 129, 0.15);  
      --glass-border: rgba(110, 231, 183, 0.3); 
      --shad: 0 8px 32px rgba(6, 95, 70, 0.3);
      --radius-lg: 20px;
      --radius-md: 15px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, Arial, sans-serif;
    }
    .card {
      max-width: 400px;
      width: 90%;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 32px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shad);
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 22px;
      text-align: center;
    }
    input[type=password] {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text);
      box-sizing: border-box;
    }
    input::placeholder {
      color: rgba(236, 253, 245, 0.6);
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    button:hover {
      background: var(--primary-dark);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
    }
    .error {
      color: #fca5a5;
    }
    .success {
      color: var(--accent);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    
    <div id="form-container">
      <input id="password" type="password" placeholder="Enter new password" />
      <input id="confirm-password" type="password" placeholder="Confirm new password" />
      <button id="reset-btn">Reset Password</button>
      <div id="message" class="message"></div>
    </div>

    <a href="login.html" class="back-link">Back to Login</a>
  </div>

<script>
const API_URL = "https://cbt-credit101.onrender.com";

const token = new URLSearchParams(window.location.search).get('token');
const messageEl = document.getElementById('message');
const formContainer = document.getElementById('form-container');
const resetBtn = document.getElementById('reset-btn');

// Check token on load
if (!token) {
  showMessage('Invalid or missing reset link. Request a new one.', 'error');
  formContainer.style.display = 'none';
}

resetBtn.addEventListener('click', async () => {
  const password = document.getElementById('password').value.trim();
  const confirmPassword = document.getElementById('confirm-password').value.trim();

  if (!password) {
    showMessage('Enter a new password', 'error');
    return;
  }

  if (password !== confirmPassword) {
    showMessage('Passwords do not match', 'error');
    return;
  }

  if (password.length < 6) {
    showMessage('Password must be at least 6 characters', 'error');
    return;
  }

  resetBtn.disabled = true;
  showMessage('Resetting password...', '');

  try {
    const res = await fetch(`${API_URL}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });

    const result = await res.json();

    if (res.ok) {
      showMessage('Password reset successful! Redirecting to login...', 'success');
      formContainer.style.display = 'none';
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    } else {
      showMessage(result.error || 'Reset failed', 'error');
      resetBtn.disabled = false;
    }
  } catch (err) {
    showMessage('Network error. Check your connection and try again.', 'error');
    resetBtn.disabled = false;
  }
});

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = 'message ' + type;
}
</script>
</body>
</html>
